<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kitchen Master Pro - REPARÉ</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --p: #6c5ce7; --s: #00cec9; --d: #ff7675; --bg: #f8f9fa; --card: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .card { background: var(--card); padding: 15px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; }
        
        /* Correction Design Boutons Zones */
        .tab-buttons { display: flex; gap: 4px; margin-bottom: 15px; }
        .tab-buttons button { 
            flex: 1; padding: 12px 2px; background: #eee; border: none; 
            border-radius: 12px; font-size: 11px; font-weight: bold; cursor: pointer;
        }
        .tab-buttons button.active { background: var(--p); color: white; }

        /* Correction Camera */
        #reader { 
            width: 100% !important; 
            border-radius: 20px; 
            overflow: hidden; 
            background: #000;
            min-height: 250px; /* Force une zone d'affichage */
        }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin: 5px 0; }
    </style>
</head>
<body>

<div class="card">
    <div id="reader"></div>
    <div style="display: flex; gap: 5px; margin-top: 10px;">
        <button class="btn" style="background: var(--s); color:white;" onclick="startCamera()">🎥 Relancer Caméra</button>
        <button class="btn" style="background: #fdcb6e; color:white;" onclick="toggleFlash()">🔦 Flash</button>
    </div>
</div>

<div class="card">
    <div class="tab-buttons">
        <button id="tabFrigo" class="active" onclick="setZone('Frigo')">🧊 Frigo</button>
        <button id="tabCongelo" onclick="setZone('Congelo')">❄️ Congélo</button>
        <button id="tabGardeManger" onclick="setZone('GardeManger')">🏠 Cellier</button>
    </div>
    <input type="text" id="itemName" placeholder="Nom de l'aliment" style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd; box-sizing:border-box;">
    <input type="date" id="itemDate" style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd; margin-top:10px; box-sizing:border-box;">
    <button class="btn" style="background: var(--p); color:white; margin-top:10px;" onclick="addItem()">💾 Ajouter</button>
</div>

<div id="inventoryList"></div>

<script>
    let stock = JSON.parse(localStorage.getItem('v14Stock')) || [];
    let currentZone = 'Frigo';
    let html5QrCode;

    // --- REPARATION CAMERA ---
    function startCamera() {
        if (html5QrCode) {
            html5QrCode.stop().then(() => { startScanner(); }).catch(() => { startScanner(); });
        } else {
            startScanner();
        }
    }

    function startScanner() {
        html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };
        
        html5QrCode.start(
            { facingMode: "environment" }, 
            config,
            (decodedText) => {
                // Analyse OpenFoodFacts
                fetch(`https://world.openfoodfacts.org/api/v0/product/${decodedText}.json`)
                .then(r => r.json()).then(d => {
                    if(d.status === 1) document.getElementById('itemName').value = d.product.product_name;
                });
            }
        ).catch(err => {
            console.error("Erreur Caméra:", err);
            alert("Erreur : Vérifie que tu as autorisé l'appareil photo dans ton navigateur.");
        });
    }

    // --- REPARATION FLASH ---
    async function toggleFlash() {
        try {
            const track = html5QrCode.getRunningTrack();
            const capabilities = track.getCapabilities();
            if (capabilities.torch) {
                const isSwitchedOn = track.getSettings().torch;
                await track.applyConstraints({ advanced: [{ torch: !isSwitchedOn }] });
            } else {
                alert("Flash non supporté sur ce navigateur/appareil.");
            }
        } catch (e) {
            alert("Active la caméra avant d'utiliser le flash.");
        }
    }

    // --- GESTION STOCK ---
    function setZone(zone) {
        currentZone = zone;
        document.querySelectorAll('.tab-buttons button').forEach(b => b.classList.remove('active'));
        document.getElementById('tab' + zone).classList.add('active');
        render();
    }

    function addItem() {
        const name = document.getElementById('itemName').value;
        const date = document.getElementById('itemDate').value;
        if(!name || !date) return;
        stock.push({ name, date, zone: currentZone, id: Date.now() });
        localStorage.setItem('v14Stock', JSON.stringify(stock));
        render();
    }

    function render() {
        const list = document.getElementById('inventoryList');
        list.innerHTML = '';
        stock.filter(it => it.zone === currentZone).forEach(it => {
            list.innerHTML += `<div class="card" style="margin-bottom:5px; padding:10px; display:flex; justify-content:space-between;">
                <b>${it.name}</b> <span>${it.date}</span>
            </div>`;
        });
    }

    // Lancement automatique
    window.onload = startScanner;
    render();
</script>
</body>
</html>
